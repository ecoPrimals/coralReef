[package]
name = "coral-driver"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Sovereign GPU driver — DRM ioctl dispatch for AMD (amdgpu) and NVIDIA (nouveau)"

[dependencies]
bytemuck = { version = "1", features = ["derive"] }
rustix = { version = "1.1.4", features = ["mm", "time", "process"] }
thiserror.workspace = true
tracing.workspace = true

# Retained temporarily for ioctl() — rustix does not yet expose a stable
# generic ioctl wrapper that accepts arbitrary #[repr(C)] structs.
# Once rustix stabilises its ioctl API or we write a thin wrapper, remove.
libc = "0.2"

[features]
default = ["nouveau", "nvidia-drm"]
nouveau = []
nvidia-drm = []
test-utils = []
rdna2-buffer-read = []

[dev-dependencies]
coral-reef.workspace = true
