[package]
name = "coral-driver"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Sovereign GPU driver — DRM ioctl dispatch for AMD (amdgpu) and NVIDIA (nouveau)"

[dependencies]
bytemuck = { version = "1", features = ["derive"] }
rustix = { version = "1.1.4", features = ["mm", "time", "process"] }
thiserror.workspace = true
tracing.workspace = true

# libc eliminated — ioctl now uses raw syscall via inline asm (see drm.rs)

[features]
default = ["nouveau", "nvidia-drm"]
nouveau = []
nvidia-drm = []
test-utils = []
rdna2-buffer-read = []

[dev-dependencies]
coral-reef.workspace = true
