[package]
name = "coral-glowplug"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Sovereign PCIe device lifecycle broker — persistent GPU management daemon"

[[bin]]
name = "coral-glowplug"
path = "src/main.rs"

[dependencies]
coral-driver = { path = "../coral-driver", features = ["vfio"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "sync", "signal", "time"] }
