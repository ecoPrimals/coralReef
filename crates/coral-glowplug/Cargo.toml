[package]
name = "coral-glowplug"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Sovereign PCIe device lifecycle broker — persistent GPU management daemon"

[lib]
name = "coral_glowplug"
path = "src/lib.rs"

[[bin]]
name = "coral-glowplug"
path = "src/main.rs"

[[bin]]
name = "coralctl"
path = "src/bin/coralctl.rs"

[features]
default = []
no-ember = []

[dependencies]
clap.workspace = true
coral-driver = { path = "../coral-driver", features = ["vfio"] }
rustix = { version = "1.1.4", features = ["net"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
toml = "0.8"
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "sync", "signal", "time"] }

[dev-dependencies]
coral-driver = { path = "../coral-driver", features = ["vfio"] }
