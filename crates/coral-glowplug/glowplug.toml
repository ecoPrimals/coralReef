# coral-glowplug configuration — biomeGate: Titan V + Radeon VII + RTX 5060
#
# This file is the reference config. Install to:
#   ~/.config/coralreef/glowplug.toml  (user service)
#   /etc/coralreef/glowplug.toml       (system service)

[daemon]
socket = "$XDG_RUNTIME_DIR/coralreef/glowplug.sock"
log_level = "info"
health_interval_ms = 5000

# Titan V — NVIDIA GV100, 12 GB HBM2, VFIO at boot
# CRITICAL: do NOT boot on nouveau — desktop apps (Cursor/Xorg) will grab
# renderD* and block during shutdown, causing kernel oops on GV100.
[[device]]
bdf = "0000:03:00.0"
name = "titan-v"
boot_personality = "vfio"
power_policy = "always_on"
role = "oracle"

# Radeon VII — AMD Vega 20 (GFX906), 16 GB HBM2
# Solo IOMMU group (no companion audio device).
# Boots on amdgpu — switch to vfio for sovereign experiments.
[[device]]
bdf = "0000:4c:00.0"
name = "radeon-vii"
boot_personality = "amdgpu"
power_policy = "always_on"
role = "compute"
