# coralReef ‚Äî cargo-deny configuration
# Run: cargo deny check
#
# Enforces ecoBin compliance: AGPL-3.0, no C sys crates, audited deps.
# Dev-dependencies are excluded ‚Äî ecoBin/sovereignty apply to the production
# binary, not test tooling. Tests may use ring/rustls for HTTP client testing;
# production TLS is provided by Tower Atomic (Songbird + BearDog).
#
# Transitive duplicate crates (no direct workspace deps; cannot fix via Cargo.toml):
#   foldhash (0.1.5, 0.2.0)   ‚Äî hashbrown‚Üípetgraph‚Üínaga vs hashbrown‚Üíindexmap/jsonrpsee-proc-macros
#   getrandom (0.2.17, 0.3.4) ‚Äî rand 0.8 (soketto, tarpc) vs rand 0.9 (jsonrpsee-core, opentelemetry_sdk)
#   hashbrown (0.15.5, 0.16.1)‚Äî petgraph‚Üínaga vs indexmap/jsonrpsee-proc-macros
#   rand (0.8.5, 0.9.2)       ‚Äî soketto + tarpc vs jsonrpsee-core + opentelemetry_sdk
#   rand_chacha (0.3.1, 0.9.0)‚Äî same split as rand
#   rand_core (0.6.4, 0.9.5)  ‚Äî same split as rand
#   rustc-hash (1.1.0, 2.1.1)  ‚Äî naga vs jsonrpsee-core
#   windows-sys (0.60.2, 0.61.2) ‚Äî socket2‚Üítokio vs clap/rustix/mio/tracing-subscriber

[graph]
exclude-dev = true

[advisories]
yanked = "deny"
unmaintained = "workspace"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "AGPL-3.0-only",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"
allow-wildcard-paths = true
deny = [
    # ecoBin: no C crypto or sys crates in the production dependency tree.
    # External TLS is provided by Tower Atomic (Songbird + BearDog) using
    # pure RustCrypto ‚Äî zero C dependencies in production.
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
    { crate = "ring", wrappers = [] },
    { crate = "cc", wrappers = [] },
    { crate = "libz-sys", wrappers = [] },
    { crate = "curl-sys", wrappers = [] },
    { crate = "libssh2-sys", wrappers = [] },
    { crate = "libgit2-sys", wrappers = [] },
    { crate = "boringssl-sys", wrappers = [] },
]

# EVOLUTION(libc-zero): Uncomment to ban libc once all upstream deps migrate.
# Currently blocked by: tokio (mio#1735 ‚Üí rustix migration), getrandom,
# signal-hook-registry, parking_lot_core. rustix itself already uses linux_raw.
# Canary: `cargo tree --workspace --depth 1 -i libc`
#   { crate = "libc", wrappers = [] },

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
