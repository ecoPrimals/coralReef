# cargo-deny configuration for coralReef
# https://embarkstudios.github.io/cargo-deny/

[licenses]
allow = [
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# "warn" for wildcards: path/workspace deps are standard in Rust workspaces
wildcards = "warn"

[advisories]
# unmaintained: scope of crates to check (all/workspace/transitive/none)
unmaintained = "all"
yanked = "deny"
ignore = [
    # bincode 1.3.3 considered complete by maintainers; tarpc dependency
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is considered complete by maintainers" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
