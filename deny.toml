# coralReef — cargo-deny configuration
# Run: cargo deny check
#
# Enforces ecoBin compliance: AGPL-3.0, no C sys crates, audited deps.
# Dev-dependencies are excluded — ecoBin/sovereignty apply to the production
# binary, not test tooling. Tests may use ring/rustls for HTTP client testing;
# production TLS is provided by Tower Atomic (Songbird + BearDog).

[graph]
exclude-dev = true

[advisories]
yanked = "warn"
unmaintained = "workspace"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "Unicode-3.0",
    "AGPL-3.0-only",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"
allow-wildcard-paths = true
deny = [
    # ecoBin: no C sys crates in the dependency tree
    { crate = "openssl-sys", wrappers = [] },
    # ring is banned from production deps. It only enters via jsonrpsee's
    # "client" feature in dev-dependencies (test-only).
    # External TLS is provided by Tower Atomic (Songbird + BearDog) using
    # pure RustCrypto — zero C dependencies in production.
    { crate = "ring", wrappers = [] },
    { crate = "libz-sys", wrappers = [] },
    { crate = "curl-sys", wrappers = [] },
    { crate = "libssh2-sys", wrappers = [] },
    { crate = "libgit2-sys", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
