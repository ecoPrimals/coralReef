# coralReef genomeBin Manifest
# ============================
#
# Per-primal genomeBin deployment manifest.
# Follows ecoPrimals genomeBin Architecture Standard.
#
# See: wateringHole/GENOMEBIN_ARCHITECTURE_STANDARD.md

[primal]
name = "coralreef"
version = "0.1.0"
license = "AGPL-3.0-or-later"
binary = "coralreef"
pie_verified = true
ecobin_grade = "A++"
iteration = 80
tests = 4504
description = "Sovereign Rust GPU shader compiler. Compiles WGSL/SPIR-V/GLSL compute shaders to native GPU binaries (NVIDIA SM35-SM120, AMD GCN5/RDNA2-4). coralDriver + coralGpu. Zero C dependencies."

[capabilities]
provided = [
    "shader.compile.wgsl",
    "shader.compile.spirv",
    "shader.compile.wgsl.multi",
    "shader.compile.status",
    "shader.compile.capabilities",
    "health.check",
    "health.liveness",
    "health.readiness",
    "identity.get",
    "capability.list",
    "capability.register",
    "ipc.heartbeat",
]
consumed = []

[capabilities.gpu_targets]
nvidia = ["sm35", "sm70", "sm75", "sm80", "sm86", "sm89", "sm120"]
amd = ["gcn5", "rdna2", "rdna3", "rdna4"]

[dependencies]
external = []

[platforms]
primary = "linux-x86_64"
cross_ready = ["linux-aarch64"]

[ipc_transports]
jsonrpc = ["unix_socket", "tcp"]
tarpc = ["unix_socket", "tcp"]

[security]
btsp_phase = 2
forbid_unsafe = ["coralreef-core", "coral-reef", "coral-glowplug", "coral-ember", "primal-rpc-client", "coral-gpu"]
unsafe_exception = "coral-driver (hardware ioctl/MMIO)"
