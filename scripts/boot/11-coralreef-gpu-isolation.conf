# coralReef GPU isolation: prevent Xorg from hotplugging compute GPUs
#
# Problem: When glowPlug/ember swaps a Titan V to nouveau, the kernel
# creates a new DRM node (/dev/dri/cardN). Xorg detects this via its
# AutoAddGPU mechanism, tries to add the GPU as a RandR provider, and
# gnome-shell crashes on the CRT-less reconfiguration event.
#
# Fix: Disable GPU hotplugging entirely. The display GPU (RTX 5060) is
# explicitly specified by the OutputClass in 10-nvidia.conf. Compute
# GPUs managed by glowPlug never need Xorg access.
#
# Install:
#   sudo cp scripts/boot/11-coralreef-gpu-isolation.conf /etc/X11/xorg.conf.d/
#   (requires Xorg restart / reboot)

Section "ServerFlags"
    Option "AutoAddGPU" "false"
    Option "AutoBindGPU" "false"
EndSection
