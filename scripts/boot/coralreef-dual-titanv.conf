# coralReef dual Titan V modprobe configuration
#
# SOVEREIGNTY: Prevents NVIDIA's open kernel module from probing Titan V
# GPUs at boot. The open nvidia.ko only supports Turing+ (GSP-capable)
# GPUs; its failed probe on Volta (GV100) corrupts hardware state and
# causes kernel panics when vfio-pci subsequently reads registers.
#
# Strategy: vfio-pci claims both Titan V's (10de:1d81) BEFORE nvidia
# loads, via softdep ordering and PCI ID matching. nvidia then only
# probes the RTX 5060 (10de:2d05) for display.
#
# Install:
#   sudo cp scripts/boot/coralreef-dual-titanv.conf /etc/modprobe.d/
#   sudo cp scripts/boot/99-coralreef-vfio.rules /etc/udev/rules.d/
#   sudo update-initramfs -u
#   sudo kernelstub -a "vfio-pci.ids=10de:1d81"
#   # cold reboot (full power off for 10s to reset GPU state)

# ── Layer 1: Module Load Ordering ────────────────────────────
# When nvidia.ko loading is triggered (by nvidia-drm.modeset=1 in
# cmdline), force vfio-pci to load FIRST. vfio-pci then claims the
# Titan V's before nvidia's probe function can touch them.
softdep nvidia pre: vfio-pci
softdep nouveau pre: vfio-pci

# ── Layer 2: PCI ID Claim ────────────────────────────────────
# Bind vfio-pci to ALL 10de:1d81 devices (Titan V / GV100) at module
# load time. Safe because 10de:1d81 is unique to Titan V — the RTX
# 5060 is 10de:2d05 and is unaffected.
options vfio-pci ids=10de:1d81 disable_idle_d3=1

# ── Layer 3: Nouveau Coexistence ─────────────────────────────
# Allow nouveau to load (overrides nvidia's blacklist) for HBM2
# resurrection cycles. coral-glowplug manages nouveau binding at
# runtime — it is never bound at boot.
install nouveau /sbin/modprobe --ignore-install nouveau
remove nouveau /sbin/modprobe -r --ignore-remove nouveau
alias nouveau nouveau
